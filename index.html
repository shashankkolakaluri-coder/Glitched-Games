  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter'].includes(e.code))e.preventDefault();
});
document.addEventListener('keyup',e=>{K[e.code]=false;});
function clearKp(){for(const k in Kp)delete Kp[k];}
function pressed(c){return!!Kp[c];}
function anyPressed(){return Object.values(Kp).some(v=>v);}

function tbind(id,code){
  const el=document.getElementById(id);if(!el)return;
  el.addEventListener('touchstart',e=>{e.preventDefault();if(!K[code])Kp[code]=true;K[code]=true;},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();K[code]=false;},{passive:false});
  el.addEventListener('mousedown',e=>{if(!K[code])Kp[code]=true;K[code]=true;});
  el.addEventListener('mouseup',e=>{K[code]=false;});
}

function wx(lx){return lx*SX;}   // world x to screen x
function wy(ly){return GY+ly*SY;} // world y to screen y (offset by HUD)
function ww(lw){return lw*SX;}
function wh(lh){return lh*SY;}

function sy(ly){return Math.floor(GY+(ly-camY)*SY);}

  for(let i=0;i<n;i++){

    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col,sz:2+Math.random()*3});
  }
}

// ── BULLET SYSTEM ──────────────────────────────────────────────────
function swingSword(){
  if(p.swinging)return;
  const pow=getPow();
  p.swinging=true;
  p.swingFrame=0;
  p.swingMax=pow.swingFrames||12;
  p.shootCd=Math.max(6,p.swingMax-4);
  p.swingPow=pow;
  // Twin blades: flag for second hit mid-swing
  p._twin2=pow.shape==='twin'?false:null;

  // Warp sabre: teleport forward on swing
  if(pow.shape==='arc'&&pow.name==='WARP SABRE'){
    const ox=p.x;
    p.x=Math.min(p.x+p.facing*80,(CL.width-p.w-10));
    p.x=Math.max(0,p.x);
    spawnParts(ox+p.w/2,p.y+p.h/2,pow.weapCol,8,3);
    spawnParts(p.x+p.w/2,p.y+p.h/2,pow.weapCol,6,2);
  }
  // Overload blade hits everything on screen
  if(pow.shape==='spin'){
    for(const en of CL.enemies||[]){
      if(!en.dead){hurtEnemy(en,pow.dmg);spawnParts(en.x+en.w/2,en.y+en.h/2,pow.weapCol,6,3);}
    }
    if(CL.boss&&!CL.boss.dead)hitBoss(pow.dmg);
    shake(5,16);glitchE=Math.max(0,glitchE-8);
    for(let i=0;i<8;i++)addGLine();
  }
  doSwingHit(pow,1.0);
}

function doSwingHit(pow,dmgMult){
  // Hit arc in front of player
  const reach=pow.reach||44;
  const arcH=reach*0.7;
  let cx,cy;
  if(pow.shape==='overhead'){
    // Crash axe hits in front + slightly up
    cx=p.x+(p.facing>0?p.w:-reach);
    cy=p.y-10;
  } else if(pow.shape==='thrust'||pow.shape==='stab'){
    cx=p.x+(p.facing>0?p.w:-reach);
    cy=p.y+p.h*0.2;
  } else {
    cx=p.x+(p.facing>0?p.w:-reach);
    cy=p.y;
  }
  const arcW=reach,finalH=pow.shape==='overhead'?reach:arcH;
  let hit=0;
  for(const en of CL.enemies||[]){
    if(!en.dead&&ov(cx,cy,arcW,finalH,en.x,en.y,en.w,en.h)){
      const d=Math.round(pow.dmg*(dmgMult||1));
      if(pow.name==='FROST BLADE'){en.frozen=Math.max(en.frozen,160);}
      if(pow.name==='CORRUPT SWORD'){en.frozen=Math.max(en.frozen,60);}
      hurtEnemy(en,d);hit++;
    }
  }
  if(CL.boss&&!CL.boss.dead){
    if(ov(cx,cy,arcW,finalH,CL.boss.x,CL.boss.y,CL.boss.w,CL.boss.h)){
      hitBoss(Math.round(pow.dmg*(dmgMult||1)));hit++;
    }
  }
  if(hit>0){
    shake(2,6);
    floaty(cx+arcW/2,cy+(finalH/2),'HIT'+(hit>1?' x'+hit:'!'),pow.weapCol);
    spawnParts(cx+arcW/2,cy+finalH/2,pow.weapCol,10,4);
    glitchE=Math.min(100,glitchE+6);
  }
  return hit;
}

function tryDeflect(){
  // Active during swing AND for 8 frames after (grace window)
  const activeSwing = p.swinging || (p.swingFrame>0 && p.swingFrame<=p.swingMax+8);
  if(!activeSwing)return;
  const pow=p.swingPow||getPow();
  // Generous deflect zone — large enough to realistically intercept shots
  const reach=(pow.reach||44)*2.0;
  const deflectX=p.facing>0 ? p.x-8 : p.x+p.w-reach+8;
  const deflectY=p.y-24;
  const deflectW=reach+p.w;
  const deflectH=p.h+48;

  for(let i=bossProj.length-1;i>=0;i--){
    const bp=bossProj[i];
    if(bp.deflected)continue;
    if(bp.x>=deflectX && bp.x<=deflectX+deflectW &&
       bp.y>=deflectY && bp.y<=deflectY+deflectH){
      // Send it back fast toward the shooter
      const spd=Math.sqrt(bp.vx*bp.vx+bp.vy*bp.vy);
      bp.vx=-bp.vx*1.8;
      bp.vy=-Math.abs(bp.vy)*0.5;
      bp.deflected=true;
      bp.col='#ffff88';
      bp.r=Math.max(bp.r,7);
      spawnParts(bp.x,bp.y,'#ffffff',12,5);
      spawnParts(bp.x,bp.y,pow.weapCol,8,4);
      floaty(p.x+p.w/2,p.y-30,'✦ DEFLECT!','#ffff88');
      shake(4,12);
      glitchE=Math.min(100,glitchE+15);
      if(pow.name==='ECHO SWORD'){
        for(const en of CL.enemies||[])if(!en.dead){
          if(Math.abs(en.x+en.w/2-p.x)<140){en.dir*=-1;en.frozen=Math.max(en.frozen,120);}
        }
      }
    }
  }
  // Deflected shots deal damage on contact
  for(let i=bossProj.length-1;i>=0;i--){
    const bp=bossProj[i];
    if(!bp.deflected)continue;
    if(CL.boss&&!CL.boss.dead){
      const b=CL.boss;
      const dist=Math.sqrt((bp.x-b.x-b.w/2)**2+(bp.y-b.y-b.h/2)**2);
      if(dist<b.w*0.7){
        hitBoss(3);bossProj.splice(i,1);
        floaty(b.x+b.w/2,b.y-10,'✦ REFLECT +3','#ffff00');
        continue;
      }
    }
    for(const en of CL.enemies||[]){
      if(en.dead)continue;
      if(bp.x>=en.x-5&&bp.x<=en.x+en.w+5&&bp.y>=en.y-5&&bp.y<=en.y+en.h+5){
        hurtEnemy(en,2);bossProj.splice(i,1);break;
      }
    }
    // Remove deflected shots that go off screen
    if(bp.x<0||bp.x>CL.width||bp.y<0||bp.y>500){bossProj.splice(i,1);}
  }
}

function shoot(){

  swingSword();

function updateBullets(){
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.life--;b.x+=b.vx;b.y+=b.vy;
    if(b.life<=0||b.x<camX-40||b.x>camX+700){bullets.splice(i,1);continue;}
    if(b.isBomb){b.vy+=0.4;} // gravity on bombs (kept for CRASH glitch power fallback
    b.x+=b.vx;b.y+=b.vy;

    // Bomb lands
    if(b.isBomb){
      for(const pl of CL.platforms||[]){
        if(ov(b.x,b.y,b.w,b.h,pl.x,pl.y,pl.w,pl.h)){
          // EXPLODE
          spawnParts(b.x+b.w/2,b.y+b.h/2,b.col,16,4);shake(4,12);
          for(const en of CL.enemies||[])if(!en.dead){
            if(ov(b.x-30,b.y-30,b.w+60,b.h+60,en.x,en.y,en.w,en.h))hurtEnemy(en,b.dmg);
          }
          if(CL.boss&&!CL.boss.dead&&ov(b.x-30,b.y-30,b.w+60,b.h+60,CL.boss.x,CL.boss.y,CL.boss.w,CL.boss.h))hitBoss(b.dmg);
          bullets.splice(i,1);break;
        }
      }
      if(i<bullets.length&&(b.x<0||b.x>CL.width||b.life<=0)){bullets.splice(i,1);continue;}
      continue;
    }

    // Off screen / expired
    if(b.x<camX-40||b.x>camX+680||b.life<=0){bullets.splice(i,1);continue;}

    // Wall collision (non-phasing)
    if(!b.phasing){
      let hit=false;
      for(const pl of CL.platforms||[]){
        if(ov(b.x,b.y,b.w,b.h,pl.x,pl.y,pl.w,pl.h)){hit=true;break;}
      }
      if(hit){spawnParts(b.x,b.y,b.col,4,2);bullets.splice(i,1);continue;}
    }

    // Enemy hit
    let killed=false;
    for(const en of CL.enemies||[]){
      if(en.dead)continue;
      if(ov(b.x,b.y,b.w,b.h,en.x,en.y,en.w,en.h)){
        // Special effects per power
        if(b.pow==='FREEZE'||b.pow==='FROST BURST'){en.frozen=Math.max(en.frozen,150);}
        if(b.pow==='REWIND'){en.dir*=-1;en.vx*=1.5;}
        hurtEnemy(en,b.dmg);
        if(!b.piercing){bullets.splice(i,1);killed=true;break;}
      }
    }
    if(killed)continue;

    // Boss hit
    if(CL.boss&&!CL.boss.dead){
      if(ov(b.x,b.y,b.w,b.h,CL.boss.x,CL.boss.y,CL.boss.w,CL.boss.h)){
        if(b.pow==='FREEZE'){CL.boss.frozen=Math.max(CL.boss.frozen||0,100);}
        hitBoss(b.dmg);
        if(!b.piercing){bullets.splice(i,1);}
      }
    }
  }
}

function hurtEnemy(en,dmg){
  en.hp-=dmg;
  spawnParts(en.x+en.w/2,en.y+en.h/2,'#ff4444',6,2);
  if(en.hp<=0){

    floaty(en.x+en.w/2,en.y,'+100','#ffcc00');

  }
}

// ── GLITCH POWERS (X key) ──────────────────────────────────────────
function useGlitchPower(){
  if(glitchE<25){floaty(p.x+p.w/2,p.y,'NEED MORE GLITCH!','#ff4444');return;}
  const pow=getPow();
  switch(pow.name){
    case'GLITCH DAGGER': doClip();break;
    case'FROST BLADE':   doFreeze();break;
    case'CORRUPT SWORD': doCorrupt();break;
    case'PHASE BLADE':   doPhase();break;
    case'WARP SABRE':    doWarpPower();break;
    case'TWIN BLADES':   doClonePower();break;
    case'CRASH AXE':     doCrashPower();break;
    case'ECHO SWORD':    doRewindPower();break;
    case'OVERLOAD BLADE':doOverloadPower();break;
    case'NULL BLADE':    doNullPower();break;
    default: doPhase();break;
  }
}
function doClip(){
  for(const cw of CL.clipWalls||[]){
    const d=Math.abs((p.x+p.w/2)-(cw.x+cw.w/2));
    if(d<90){p.glitchActive=true;p.glitchTimer=100;glitchE-=25;
      shake(3,10);spawnParts(p.x+p.w/2,p.y+p.h/2,'#cc44ff',14,3);
      floaty(p.x+p.w/2,p.y,'PHASE CLIP!','#cc44ff');return;}
  }
  // fallback: phase forward a bit
  p.x+=60;spawnParts(p.x,p.y+p.h/2,'#cc44ff',8,3);glitchE-=15;
}
function doFreeze(){
  for(const en of CL.enemies||[])if(!en.dead)en.frozen=200;
  if(CL.boss)CL.boss.frozen=Math.max(CL.boss.frozen||0,80);
  glitchE-=30;shake(2,8);spawnParts(p.x+p.w/2,p.y+p.h/2,'#00aaff',14,3);
  floaty(p.x+p.w/2,p.y,'FREEZE ALL!','#00aaff');
}
function doCorrupt(){
  let n=0;
  for(const en of CL.enemies||[])if(!en.dead){
    const d=Math.abs(en.x+en.w/2-p.x-p.w/2);

}
function doPhase(){p.glitchActive=true;p.glitchTimer=130;p.invFrames=130;glitchE-=25;
  spawnParts(p.x+p.w/2,p.y+p.h/2,'#aa00ff',14,3);floaty(p.x+p.w/2,p.y,'PHASE!','#aa00ff');}
function doWarpPower(){

function doClonePower(){

function doCrashPower(){

// ── BOSS ────────────────────────────────────────────────────────────
function hitBoss(dmg){
  const b=CL.boss;if(!b||b.dead)return;
  if((b.invFrames||0)>0)return; // invincible!
  b.invFrames=12; // brief iframes between hits
  b.hp=Math.max(0,b.hp-dmg);
  shake(4,14);spawnParts(b.x+b.w/2,b.y+b.h/2,'#ff0000',10,3);
  floaty(b.x+b.w/2,b.y,'-'+dmg,'#ff4444');
  // Phase change
  if(b.hp<=Math.floor(b.maxHp*0.5)&&b.phase===1){
    b.phase=2;b.vx*=1.6;shake(6,20);floaty(b.x+b.w/2,b.y-10,'PHASE 2!','#ff0000');setEchoDialogue('PHASE 2!! Runner dodge DODGE DODGE!! (>.<)',220);
  }
  if(b.type==='final'&&b.hp<=Math.floor(b.maxHp*0.25)&&b.phase<3){
    b.phase=3;b.vx*=1.3;shake(8,25);floaty(b.x+b.w/2,b.y-10,'PHASE 3!','#ff0000');setEchoDialogue('PHASE 3!!! THIS IS IT — FINISH HIM!!!! >\(^o^)/<',240);
  }
  if(b.hp<=0){
    b.dead=true;SCORE+=2000;
    spawnParts(b.x+b.w/2,b.y+b.h/2,'#ffaa00',40,6);shake(10,35);
    if(b.type==='final'){setTimeout(()=>{STATE='win';},1800);setEchoDialogue('YOU DID IT!! WE\'RE FREE!! I\'m so proud of you!! (T^T)♥',300);}
    else{levelClearTimer=110;setEchoDialogue('YEAAAH!! You beat him!! Amazing!! ♪ (^o^)/',200);}
  }
}
function updateBoss(){
  const b=CL.boss;if(!b||b.dead)return;
  b.frozen=(b.frozen||0);
  if(b.frozen>0){b.frozen--;return;}
  if((b.invFrames||0)>0)b.invFrames--;
  b.moveT=(b.moveT||0)+1;
  b.x+=b.vx*(b.dir||1);
  const lim=CL.width-b.w-80;
  if(b.x<=80)b.dir=1;
  if(b.x>=lim)b.dir=-1;
  if(b.moveT%80===0){b.vy=-9;}
  b.vy=(b.vy||0)+0.45;if(b.vy>14)b.vy=14;
  b.y+=b.vy;
  for(const pl of CL.platforms||[]){
    if(ov(b.x,b.y,b.w,b.h,pl.x,pl.y,pl.w,pl.h)&&b.vy>=0){b.y=pl.y-b.h;b.vy=0;}
  }
  // Shoot
  b.projT=(b.projT||0)+1;
  const rate=b.phase===3?50:b.phase===2?70:110;
  if(b.projT>=rate){
    b.projT=0;
    const dx=(p.x+p.w/2)-(b.x+b.w/2);
    const dy=(p.y+p.h/2)-(b.y+b.h/2);
    const len=Math.sqrt(dx*dx+dy*dy)||1;
    const spd=2.5+b.phase*0.5;
    const count=b.phase===3?3:b.phase===2?2:1;
    for(let i=0;i<count;i++){
      const spread=(i-(count-1)/2)*0.25;
      bossProj.push({x:b.x+b.w/2,y:b.y+b.h/2,
        vx:dx/len*spd+spread*2,vy:dy/len*spd+spread,r:7,col:b.col});
    }
  }
  // Touch damage
  if(p.invFrames<=0&&ov(p.x,p.y,p.w,p.h,b.x,b.y,b.w,b.h))hurtPlayer(1);
}
function updateBossProj(){
  for(let i=bossProj.length-1;i>=0;i--){
    const bp=bossProj[i];
    bp.x+=bp.vx;bp.y+=bp.vy;
    if(bp.x<0||bp.x>CL.width||bp.y>H+60){bossProj.splice(i,1);continue;}
    if(!bp.deflected&&p.invFrames<=0&&ov(p.x,p.y,p.w,p.h,bp.x-bp.r,bp.y-bp.r,bp.r*2,bp.r*2)){
      hurtPlayer(1);bossProj.splice(i,1);
    }
  }
}

// ── PLAYER UPDATE ───────────────────────────────────────────────────
function hurtPlayer(dmg){
  const pow=getPow();
  if(p.glitchActive&&pow.name==='PHASE')return;
  p.hp-=dmg*DM.dmg;p.invFrames=90;shake(5,15);
  spawnParts(p.x+p.w/2,p.y+p.h/2,'#ff4444',8,3);
  if(p.hp<=0){p.hp=0;LIVES--;STATE='dead';}
}
function updatePlayer(){
  const left=K['ArrowLeft']||K['KeyA'];
  const right=K['ArrowRight']||K['KeyD'];
  const jump=K['ArrowUp']||K['KeyW']||K['Space'];
  const fire=K['KeyZ']||K['KeyJ'];
  const gpow=K['KeyX']||K['ShiftLeft'];

  // Weapon switch Q/E
  if(pressed('KeyQ'))switchWeapon(-1);
  if(pressed('KeyE'))switchWeapon(1);

  if(left){p.vx=-3;p.facing=-1;}
  else if(right){p.vx=3;p.facing=1;}
  else{p.vx*=0.72;if(Math.abs(p.vx)<0.1)p.vx=0;}

  if(jump&&p.jumpsLeft>0&&!p._jh){p.vy=-10;p.jumpsLeft--;p._jh=true;spawnParts(p.x+p.w/2,p.y+p.h,getPow().col,4,2);}
  if(!jump)p._jh=false;

  if(fire&&p.shootCd<=0&&!p._zh){shoot();p._zh=true;}
  if(!fire)p._zh=false;
  if(p.shootCd>0)p.shootCd--;
  if(p.swinging){
    p.swingFrame++;
    if(p._twin2===false&&p.swingFrame>=Math.floor(p.swingMax*0.6)){
      p._twin2=true;doSwingHit(p.swingPow||getPow(),1.0);
    }
    if(p.swingFrame>=p.swingMax)p.swinging=false;
  } else if(p.swingFrame>0){
    p.swingFrame++; // keep counting for post-swing grace window
    if(p.swingFrame>p.swingMax+8)p.swingFrame=0;
  }
  if(p.bombCd>0)p.bombCd--;

  if(pressed('KeyX')||pressed('ShiftLeft'))useGlitchPower();

  // Deflect runs every frame while swinging
  tryDeflect();

  // Physics
  p.vy+=0.45;if(p.vy>14)p.vy=14;

  // Horizontal movement + collision
  p.x+=p.vx;
  const isClipping=p.glitchActive&&getPow().name==='GLITCH DAGGER';
  if(!isClipping){
    for(const cw of CL.clipWalls||[])
      if(ov(p.x,p.y,p.w,p.h,cw.x,cw.y,cw.w,cw.h)){p.x-=p.vx;p.vx=0;}
  }
  for(const pl of CL.platforms||[])
    if(ov(p.x,p.y,p.w,p.h,pl.x,pl.y,pl.w,pl.h)){p.x-=p.vx;p.vx=0;}
  p.x=Math.max(0,Math.min((CL.width||2000)-p.w,p.x));

  // Vertical
  p.onGround=false;
  p.y+=p.vy;
  for(const pl of CL.platforms||[]){
    if(ov(p.x,p.y,p.w,p.h,pl.x,pl.y,pl.w,pl.h)){
      if(p.vy>=0&&p.y+p.h<=pl.y+p.vy+2){p.y=pl.y-p.h;p.vy=0;p.onGround=true;p.jumpsLeft=1;}
      else if(p.vy<0){p.y=pl.y+pl.h;p.vy=0;}
    }
  }
  if(p.y>500)hurtPlayer(99);
  if(p.invFrames>0)p.invFrames--;
  if(p.glitchTimer>0){p.glitchTimer--;if(p.glitchTimer<=0)p.glitchActive=false;}
  glitchE=Math.min(100,glitchE+0.1);

  // Anim
  p.animT++;if(p.animT>7){p.animT=0;p.animF=(p.animF+1)%4;}

  // Rewind snapshot
  if(FRAME%4===0)rewindBuf.push({x:p.x,y:p.y,vx:p.vx,vy:p.vy,hp:p.hp});
  if(rewindBuf.length>90)rewindBuf.shift();
}

// ── ENEMIES UPDATE ──────────────────────────────────────────────────
function updateEnemies(){
  for(const en of CL.enemies||[]){
    if(en.dead)continue;
    if(en.frozen>0){en.frozen--;continue;}
    const spd=(en.type==='fast'?1.9:en.type==='armored'?0.8:1.2)*DM.eSpd;
    en.x+=spd*en.dir;
    en._p=(en._p||0)+spd;
    if(en._p>en.patrol){en.dir*=-1;en._p=0;}
    // Gravity
    en.vy=(en.vy||0)+0.45;if(en.vy>14)en.vy=14;
    en.y+=en.vy;
    for(const pl of CL.platforms||[])
      if(ov(en.x,en.y,en.w,en.h,pl.x,pl.y,pl.w,pl.h)&&en.vy>=0){en.y=pl.y-en.h;en.vy=0;}
    // Shooter enemy fires
    if(en.type==='shooter'){
      en.shootCd=(en.shootCd||60)-1;
      if(en.shootCd<=0){
        en.shootCd=90+Math.random()*60;
        const dx=p.x+p.w/2-en.x-en.w/2;
        bossProj.push({x:en.x+en.w/2,y:en.y+en.h/2,vx:Math.sign(dx)*4,vy:-0.5,r:5,col:'#ff8800'});
      }
    }
    // Stomp / touch
    if(p.invFrames<=0&&ov(p.x,p.y,p.w,p.h,en.x,en.y,en.w,en.h)){
      if(p.vy>0&&p.y+p.h<en.y+en.h*0.5&&en.type!=='armored'){
        hurtEnemy(en,99);p.vy=-7;glitchE=Math.min(100,glitchE+12);
        floaty(en.x+en.w/2,en.y,'+STOMP','#ffcc00');
      }else hurtPlayer(1);
    }
  }
}

// ── CLONES ───────────────────────────────────────────────────────────
function updateCompanionPhysics(){

  }
  // Hurt reaction
  if(p.invFrames===88&&echoDialogueTimer<50){
    setEchoDialogue('RUNNER!! Are you okay?! (>.<)',200);
  }
}

function updateClones(){
  for(let i=clones.length-1;i>=0;i--){
    const cl=clones[i];
    cl.vy=(cl.vy||0)+0.45;cl.x+=cl.vx;cl.y+=cl.vy;
    for(const pl of CL.platforms||[])
      if(ov(cl.x,cl.y,cl.w,cl.h,pl.x,pl.y,pl.w,pl.h)&&cl.vy>=0){cl.y=pl.y-cl.h;cl.vy=0;cl.vx*=0.8;}
    for(const en of CL.enemies||[])if(!en.dead){
      const dx=(cl.x+cl.w/2)-(en.x+en.w/2);
      if(Math.abs(dx)<130)en.dir=Math.sign(dx);
    }
    cl.life--;if(cl.life<=0||cl.y>500)clones.splice(i,1);
  }
}

// ── CAMERA ───────────────────────────────────────────────────────────
function updateCam(){
  const tx=p.x-320/SX;
  camX+=(tx-camX)*0.12;
  camX=Math.max(0,Math.min((CL.width||2000)-640/SX,camX));
}

// ── INIT LEVEL ───────────────────────────────────────────────────────
function initLevel(idx){
  CL=JSON.parse(JSON.stringify(LEVELS[idx]));
  if(CL.boss){
    Object.assign(CL.boss,{hp:Math.round(CL.boss.maxHp*DM.bosHp),dead:false,
      dir:1,frozen:0,vy:0,moveT:0,projT:0,phase:1});
    CL.boss.maxHp=Math.round(CL.boss.maxHp*DM.bosHp);
  }
  resetP(CL.spawn.x,CL.spawn.y);
  echoX=CL.spawn.x-55;echoY=CL.spawn.y-40;echoVx=0;echoVy=0;
  weaponSlot=Math.min(weaponSlot,getUnlockedCount()-1);
  camX=0;camY=0;
  particles=[];floaties=[];glitchLines=[];bullets=[];bossProj=[];clones=[];rewindBuf=[];
  glitchE=50;
  updateHUD();
  if(CL.isBoss){STATE='bossIntro';bossIntroTimer=140;}
  else STATE='play';
}

// ── DRAW ─────────────────────────────────────────────────────────────
function dsx(lx){return Math.floor((lx-camX)*SX+shakeX);}
function dsy(ly){return Math.floor(GY+(ly-camY)*SY+shakeY);}
function drect(lx,ly,lw,lh,col,stroke){
  const x=dsx(lx),y=dsy(ly),w=Math.ceil(lw*SX),h=Math.ceil(lh*SY);
  ctx.fillStyle=col;ctx.fillRect(x,y,w,h);
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1;ctx.strokeRect(x+0.5,y+0.5,w-1,h-1);}
}

function drawBg(){
  const g=ctx.createLinearGradient(0,GY,0,GY+GH);
  const[c1,c2]=CL.bgGrad||['#050510','#0d0d25'];
  g.addColorStop(0,c1);g.addColorStop(1,c2);
  ctx.fillStyle=g;ctx.fillRect(0,GY,W,GH);
  // Stars
  ctx.fillStyle='rgba(255,255,255,0.4)';
  for(let i=0;i<60;i++){
    const sx2=((i*137+camX*SX*0.1)%W)|0;
    const sy2=GY+((i*97)%(GH*0.55))|0;
    ctx.fillRect(sx2,sy2,1,1);
  }
  ctx.fillStyle='rgba(0,0,0,0.1)';
  for(let y=GY;y<GY+GH;y+=3)ctx.fillRect(0,y,W,1);
}

function drawPlatforms(){
  for(const pl of CL.platforms||[]){
    const x=dsx(pl.x),y=dsy(pl.y),w=Math.ceil(pl.w*SX),h=Math.ceil(pl.h*SY);
    if(x+w<0||x>W)continue;
    ctx.fillStyle=pl.c;ctx.fillRect(x,y,w,h);
    ctx.fillStyle=pl.e;ctx.fillRect(x,y,w,3);
    ctx.fillStyle='rgba(0,0,0,0.2)';
    for(let i=0;i<w;i+=10)ctx.fillRect(x+i,y+4,5,h-4);
  }
}

function drawClipWalls(){
  for(const cw of CL.clipWalls||[]){
    const x=dsx(cw.x),y=dsy(cw.y),w=Math.ceil(cw.w*SX),h=Math.ceil(cw.h*SY);
    // Phase walls use violet/purple — distinct from the player's teal glitch aura
    ctx.fillStyle=p.glitchActive?'rgba(170,0,255,0.22)':'rgba(60,30,90,0.85)';
    ctx.fillRect(x,y,w,h);
    ctx.strokeStyle=p.glitchActive?'#cc44ff':'#7744aa';
    ctx.lineWidth=1;ctx.strokeRect(x+0.5,y+0.5,w-1,h-1);
    if(!p.glitchActive){
      ctx.fillStyle='rgba(200,100,255,0.6)';ctx.font=`${10*SY}px Courier New`;
      ctx.fillText('??',x+w/2-8,y+h/2+4);
    }else{
      // While phasing, show a brighter pulse to confirm pass-through
      const pulse=0.5+0.4*Math.sin(FRAME*0.3);
      ctx.fillStyle=`rgba(220,150,255,${pulse})`;
      ctx.fillRect(x,y,w,h);
    }
  }
}

function drawBlocks(){
  for(const bl of CL.blocks||[]){
    if(bl.broken)continue;
    const x=dsx(bl.x),y=dsy(bl.y),w=Math.ceil(bl.w*SX),h=Math.ceil(bl.h*SY);
    ctx.fillStyle=bl.type==='?'?'#3a2a00':'#2a1a1a';ctx.fillRect(x,y,w,h);
    ctx.strokeStyle=bl.type==='?'?'#aa6600':'#553333';ctx.lineWidth=1;ctx.strokeRect(x+0.5,y+0.5,w-1,h-1);
    if(bl.type==='?'){ctx.fillStyle='#ffcc00';ctx.font=`bold ${12*SY}px Courier New`;ctx.fillText('?',x+4,y+h-3);}
  }
}

function drawEnemies(){
  for(const en of CL.enemies||[]){
    if(en.dead)continue;
    const sc=Math.max(2,Math.floor(Math.min(SX,SY)*2.2));
    const ew=8*sc,eh=9*sc;
    const ex=dsx(en.x)+Math.floor(en.w*SX/2)-ew/2;
    const ey=dsy(en.y)+Math.floor(en.h*SY/2)-eh/2;
    const frozen=en.frozen>0;
    const walk=Math.floor(FRAME/9)%2;
    const bodyCol=frozen?'#88ccff':en.type==='armored'?'#cc9900':en.type==='fast'?'#ff6622':en.type==='shooter'?'#9955ff':'#ee2222';
    const darkCol=frozen?'#3377aa':en.type==='armored'?'#886600':en.type==='fast'?'#992200':en.type==='shooter'?'#5500bb':'#991111';
    const eyeCol=frozen?'#0066ff':'#ffff00';
    ctx.save();
    // Flip toward player
    const faceRight=en.dir===1;
    if(faceRight){ctx.translate(ex+ew,ey);ctx.scale(-1,1);}else ctx.translate(ex,ey);
    // Pixel rows: each cell = sc×sc
    function px(c,r,col,w2,h2){ctx.fillStyle=col;ctx.fillRect(c*sc,r*sc,(w2||1)*sc,(h2||1)*sc);}
    // Spikes / crown top
    if(en.type==='armored'){px(0,0,'#ffcc00',1,2);px(3,0,'#ffcc00',2,1);px(7,0,'#ffcc00',1,2);}
    else{px(1,0,darkCol);px(3,0,darkCol);px(5,0,darkCol);}
    // Head rows 1-3
    px(0,1,bodyCol,8,3);
    // Eyes
    px(1,2,eyeCol);px(5,2,eyeCol);
    px(2,2,'#000');px(6,2,'#000'); // pupils
    // Mouth
    px(2,3,darkCol);px(3,3,darkCol,3);px(6,3,darkCol);
    // Body rows 4-6
    px(1,4,bodyCol,6,3);
    px(0,4,darkCol,1,2); // left arm
    px(7,4,darkCol,1,2); // right arm
    if(en.type==='shooter'){px(8,5,'#bb66ff',2);} // gun
    // Legs rows 7-8 animated
    px(1,7,darkCol,2,2);px(5,7,darkCol,2,2);
    if(walk){px(0,8,darkCol,2);px(6,8,darkCol,2);}
    else{px(2,8,darkCol,2);px(4,8,darkCol,2);}
    if(frozen){ctx.fillStyle='rgba(100,200,255,0.3)';ctx.fillRect(0,0,ew,eh);}
    ctx.restore();
    // HP bar armored
    if(en.type==='armored'&&en.maxHp>0){
      ctx.fillStyle='#330000';ctx.fillRect(ex,ey-7,ew,4);
      ctx.fillStyle='#ff4444';ctx.fillRect(ex,ey-7,ew*(en.hp/en.maxHp),4);
    }
  }
}

function drawBullets(){
  for(const b of bullets){
    const x=dsx(b.x),y=dsy(b.y),w=Math.ceil(b.w*SX),h=Math.ceil(b.h*SY);
    if(b.isBomb){
      ctx.fillStyle=b.col;ctx.beginPath();ctx.arc(x,y,w/2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x-1,y-1,w/4,0,Math.PI*2);ctx.fill();
    }else{
      ctx.fillStyle=b.col;ctx.fillRect(x,y,w,h);
      ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillRect(x,y,w/2,h/2);
    }
    // Glow
    ctx.fillStyle=b.col.replace(')',',0.2)').replace('rgb','rgba')||'rgba(255,255,0,0.2)';
    ctx.fillRect(x-2,y-2,w+4,h+4);
  }
}

function drawBossProj(){
  for(const bp of bossProj){
    const x=dsx(bp.x),y=dsy(bp.y),r=Math.ceil(bp.r*((SX+SY)/2));
    ctx.fillStyle=bp.col;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,100,0,0.3)';ctx.beginPath();ctx.arc(x,y,r+3,0,Math.PI*2);ctx.fill();
  }
}

function drawCoins(){
  for(const co of CL.coins||[]){
    if(co.collected)continue;
    const x=dsx(co.x),y=dsy(co.y),r=Math.ceil(co.r*((SX+SY)/2));
    const pulse=0.7+0.3*Math.sin(FRAME*0.12+co.x);
    if(co.isHeal){
      // Heart shape — glowing pink
      ctx.save();ctx.translate(x,y);
      ctx.globalAlpha=pulse;
      // Outer glow
      ctx.fillStyle='rgba(255,60,120,0.25)';
      ctx.beginPath();ctx.arc(0,0,r+4,0,Math.PI*2);ctx.fill();
      // Heart body using two circles + triangle
      const hr=r*0.6;
      ctx.fillStyle=co.heal>=2?'#ff2266':'#ff4488';
      ctx.beginPath();ctx.arc(-hr*0.5,0,hr,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(hr*0.5,0,hr,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.moveTo(-r,0);ctx.lineTo(0,r*1.3);ctx.lineTo(r,0);ctx.fill();
      // Shine
      ctx.fillStyle='rgba(255,255,255,0.5)';
      ctx.beginPath();ctx.arc(-hr*0.3,-hr*0.3,hr*0.35,0,Math.PI*2);ctx.fill();
      // +2 label for double heals
      if(co.heal>=2){
        ctx.fillStyle='#fff';ctx.font=`bold ${Math.ceil(r)}px Courier New`;
        ctx.textAlign='center';ctx.fillText('+2',0,r*2.2);ctx.textAlign='left';
      }
      ctx.globalAlpha=1;ctx.restore();
    }else{
      // Normal coin
      ctx.fillStyle='#ffcc00';ctx.globalAlpha=pulse;
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffaa00';ctx.globalAlpha=pulse*0.6;
      ctx.beginPath();ctx.arc(x-r*0.25,y-r*0.25,r*0.45,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
  }
}

function drawDoor(){
  const d=CL.door;if(!d)return;
  const x=dsx(d.x),y=dsy(d.y),w=Math.ceil(d.w*SX),h=Math.ceil(d.h*SY);
  const locked=CL.isBoss&&CL.boss&&!CL.boss.dead;
  const pulse=0.6+0.4*Math.sin(FRAME*0.07);
  ctx.fillStyle=locked?'#333':'#e94560';
  ctx.globalAlpha=locked?0.7:pulse;ctx.fillRect(x,y,w,h);ctx.globalAlpha=1;
  ctx.strokeStyle=locked?'#666':'#ff0088';ctx.lineWidth=2;ctx.strokeRect(x+1,y+1,w-2,h-2);
  if(locked){
    ctx.fillStyle='#888';ctx.font=`bold ${Math.ceil(12*SY)}px Courier New`;
    ctx.fillText('🔒',x+4,y+h-6);
    // "DEFEAT BOSS" label
    ctx.fillStyle='#ff4444';ctx.font=`${Math.ceil(7*SX)}px Courier New`;
    ctx.fillText('DEFEAT',x-10,y-14);ctx.fillText('BOSS',x-4,y-4);
  }else{
    ctx.fillStyle='#fff';ctx.font=`bold ${Math.ceil(14*SY)}px Courier New`;
    ctx.fillText('→',x+4,y+h-6);
  }
}

function drawBoss(){
  const b=CL.boss;if(!b||b.dead)return;
  const sc=Math.max(3,Math.floor(Math.min(SX,SY)*2.8));
  const bw=12*sc,bh=16*sc;
  const x=dsx(b.x)+Math.floor(b.w*SX/2)-bw/2;
  const y=dsy(b.y)+Math.floor(b.h*SY/2)-bh/2;
  const pulse=0.75+0.25*Math.sin(FRAME*0.1);
  const col=b.phase===3?'#ff0000':b.phase===2?'#ff4400':b.col;
  const dark=b.phase===3?'#660000':b.phase===2?'#662200':'#550000';
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.beginPath();ctx.ellipse(x+bw/2,y+bh+3,bw*0.4,sc*0.7,0,0,Math.PI*2);ctx.fill();
  function bb(cx,cy,w2,h2,base,rim){
    const x2=x+cx*sc,y2=y+cy*sc,fw=w2*sc,fh=h2*sc;
    ctx.fillStyle=base;ctx.fillRect(x2,y2,fw,fh);
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(x2,y2,Math.ceil(sc*0.6),fh);
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(x2+fw-Math.ceil(sc*0.6),y2,Math.ceil(sc*0.6),fh);
    ctx.fillStyle='rgba(255,255,255,0.14)';ctx.fillRect(x2+sc,y2,fw-sc*2,Math.ceil(sc*0.5));
    if(rim){ctx.fillStyle='rgba(255,80,0,0.22)';ctx.fillRect(x2+fw-sc,y2+sc,Math.ceil(sc*0.5),fh-sc*2);}
  }
  // Legs
  bb(1,11,3,5,dark);bb(8,11,3,5,dark);
  bb(0,14,4,2,'#330000',true);bb(8,14,4,2,'#330000',true);
  // Body
  ctx.globalAlpha=pulse;bb(1,6,10,6,col,true);ctx.globalAlpha=1;
  ctx.fillStyle='rgba(0,0,0,0.22)';ctx.fillRect(x+6*sc,y+6*sc,Math.ceil(sc*0.6),6*sc);
  // Pauldrons
  bb(-1,5,3,3,col,true);bb(10,5,3,3,col,true);
  bb(-1,8,2,3,dark);bb(11,8,2,3,dark);
  // Claws
  ctx.fillStyle='#ffcc00';
  ctx.fillRect(x-sc,y+11*sc,sc*3,Math.ceil(sc*0.7));
  ctx.fillRect(x+11*sc,y+11*sc,sc*3,Math.ceil(sc*0.7));
  // Crown
  bb(1,-3,2,3,'#ffcc00');bb(5,-4,2,4,'#ffcc00');bb(9,-3,2,3,'#ffcc00');
  ctx.fillStyle=col;
  ctx.fillRect(x+sc,y-2*sc,sc,sc);ctx.fillRect(x+5*sc,y-3*sc,sc,sc);ctx.fillRect(x+9*sc,y-2*sc,sc,sc);
  // Head
  bb(2,1,8,5,'#cc2200',true);bb(3,0,6,2,'#dd3300');
  // Visor
  ctx.fillStyle=b.phase===3?'#ff8800':b.phase===2?'#ff6600':'#ff3300';
  ctx.globalAlpha=0.85+0.15*Math.sin(FRAME*0.15);
  ctx.fillRect(x+3*sc,y+2*sc,6*sc,2*sc);ctx.globalAlpha=1;
  ctx.fillStyle='rgba(255,200,0,0.55)';ctx.fillRect(x+3*sc,y+2*sc,2*sc,Math.ceil(sc*0.5));
  // Glow
  ctx.fillStyle=col;ctx.globalAlpha=0.06*pulse;
  ctx.fillRect(x-sc*3,y-sc*3,bw+sc*6,bh+sc*6);ctx.globalAlpha=1;
  ctx.restore();
  // HP BAR
  const barW=Math.max(160,Math.ceil(220*SX)),barH=Math.max(12,Math.ceil(14*SY));
  const barX=x+bw/2-barW/2,barY=y-sc*6-barH-10;
  ctx.fillStyle='#1a0000';ctx.fillRect(barX,barY,barW,barH);
  const pct=Math.max(0,b.hp/b.maxHp);
  const bCol=pct>0.6?'#ff4444':pct>0.3?'#ff8800':'#ff0000';
  ctx.fillStyle=bCol;ctx.fillRect(barX,barY,barW*pct,barH);
  ctx.fillStyle='rgba(255,200,0,0.3)';ctx.fillRect(barX,barY,barW*pct,Math.ceil(barH*0.4));
  ctx.strokeStyle='#ff4444';ctx.lineWidth=2;ctx.strokeRect(barX+1,barY+1,barW-2,barH-2);
  const nfs=Math.max(13,Math.floor(15*Math.min(SX,1.5)));
  ctx.fillStyle='#ff4444';ctx.font=`bold ${nfs}px Courier New`;
  ctx.textAlign='center';ctx.fillText(b.name+' — PHASE '+b.phase,x+bw/2,barY-6);ctx.textAlign='left';
  for(let i=0;i<3;i++){
    ctx.fillStyle=i<b.phase?'#ff0000':'#440000';
    ctx.fillRect(barX+barW+10+i*16,barY,12,barH);
  }
}

function drawPlayer(){
  if(STATE==='dead')return;
  const blink=p.invFrames>0&&Math.floor(FRAME/4)%2===0;
  if(blink)return;
  const sc=Math.max(2,Math.floor(Math.min(SX,SY)*1.8));
  const pw=10*sc,ph=17*sc;
  const bx=dsx(p.x)+Math.floor(p.w*SX/2)-pw/2;
  const by=dsy(p.y)+Math.floor(p.h*SY/2)-ph/2;
  const pow=getPow();
  const col=pow.col;
  const isGl=p.glitchActive;
  const isSword=true; // all weapons are swords now
  const run=!p.onGround?0:Math.floor(FRAME/6)%4;
  const swingT=p.swinging?(p.swingFrame/p.swingMax):0;
  // Shadow
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath();ctx.ellipse(bx+pw/2,by+ph+2,pw*0.42,sc*0.6,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // Flip
  ctx.save();
  if(p.facing===-1){ctx.translate(bx+pw,by);ctx.scale(-1,1);}else ctx.translate(bx,by);

  function box3d(cx,cy,w2,h2,base,rim){
    const x2=cx*sc,y2=cy*sc,fw=w2*sc,fh=h2*sc;
    ctx.fillStyle=base;ctx.fillRect(x2,y2,fw,fh);
    ctx.fillStyle='rgba(0,0,0,0.28)';ctx.fillRect(x2,y2,Math.ceil(sc*0.6),fh);
    ctx.fillStyle='rgba(0,0,0,0.16)';ctx.fillRect(x2+fw-Math.ceil(sc*0.6),y2,Math.ceil(sc*0.6),fh);
    ctx.fillStyle='rgba(255,255,255,0.18)';ctx.fillRect(x2+sc,y2,fw-sc*2,Math.ceil(sc*0.5));
    if(rim){ctx.fillStyle='rgba(255,255,255,0.14)';ctx.fillRect(x2+fw-sc,y2+sc,Math.ceil(sc*0.5),fh-sc*2);}
  }

  // Legs - 4 frame walk
  const legPhase=[[0,0],[2,-2],[0,0],[-2,2]][run];
  box3d(1,11,3,4,isGl?col:'#004422');
  box3d(1+legPhase[0],13,3,3,isGl?col:'#003318');
  box3d(legPhase[0],15,4,2,'#001a10');
  box3d(6,11,3,4,isGl?col:'#004422');
  box3d(6-legPhase[0],13,3,3,isGl?col:'#003318');
  box3d(6-legPhase[0],15,3,2,'#001a10');

  // Torso
  box3d(1,6,8,5,isGl?col:'#007744',true);
  ctx.fillStyle='rgba(0,0,0,0.22)';ctx.fillRect(4*sc,6*sc,Math.ceil(sc*0.6),5*sc);
  // Pauldrons
  box3d(0,5,3,2,isGl?col:'#009955',true);
  box3d(7,5,3,2,isGl?col:'#009955',true);
  // Scarf
  ctx.fillStyle='#ff44cc';ctx.fillRect(sc,5*sc,8*sc,sc);
  ctx.fillStyle='rgba(150,0,80,0.45)';ctx.fillRect(sc,5*sc,Math.ceil(sc*0.6),sc);
  // Belt
  box3d(1,10,8,2,'#005533');
  ctx.fillStyle='#ffcc00';ctx.fillRect(4*sc,10*sc,2*sc,sc);
  ctx.fillStyle='rgba(180,120,0,0.5)';ctx.fillRect(4*sc,10*sc,sc,sc);

  // Off-hand / shield
  const hasShield=playerItems.some(i=>i.name.includes('SHIELD')||i.name.includes('CLOAK'));
  if(hasShield){
    box3d(-2,6,2,5,'#2255aa',true);
    ctx.fillStyle='rgba(100,180,255,0.35)';ctx.fillRect(-2*sc,6*sc,2*sc,5*sc);
    ctx.fillStyle='#88ccff';ctx.fillRect(-2*sc,8*sc,2*sc,2*sc);
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillRect(-2*sc,8*sc,Math.ceil(sc*0.5),2*sc);
  }else{
    box3d(-1,6,2,4,isGl?col:'#006633');
  }

  // Weapon arm + weapon
  if(!isSword){
    box3d(8,6,2,3,isGl?col:'#006633');
    box3d(8,8,2,2,isGl?col:'#005522');
    // Gun
    ctx.fillStyle=isGl?col:'#33aa66';ctx.fillRect(9*sc,7*sc,3*sc,2*sc);
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fillRect(9*sc,7*sc,sc,sc);
    ctx.fillStyle='#fff';ctx.fillRect(11*sc,7*sc,sc,sc);
    if(p.shootCd>10){
      ctx.fillStyle='#ffff88';ctx.beginPath();ctx.arc(12*sc,7*sc+Math.ceil(sc*0.5),sc*0.9,0,Math.PI*2);ctx.fill();
    }
  }else{
    box3d(8,6,2,4,isGl?col:'#006633');
    // Sword pivot point at shoulder
    const px2=9*sc,py2=6*sc;
    const sAngle=-Math.PI*0.65+swingT*Math.PI*1.15;
    const bladeLen=8*sc,bladeW=Math.ceil(sc*0.9);
    ctx.save();ctx.translate(px2,py2);ctx.rotate(sAngle);
    // Grip
    ctx.fillStyle='#553300';ctx.fillRect(-Math.ceil(bladeW*0.5),0,bladeW*2,Math.ceil(sc*1.5));
    // Guard
    ctx.fillStyle='#cc9900';ctx.fillRect(-sc,Math.ceil(sc*1.5),sc*3,Math.ceil(sc*0.7));
    ctx.fillStyle='rgba(255,220,80,0.7)';ctx.fillRect(-sc,Math.ceil(sc*1.5),sc*3,Math.ceil(sc*0.3));
    // Blade — 3D with highlight + shadow edge
    ctx.fillStyle='#ddeeff';ctx.fillRect(0,Math.ceil(sc*2.2),bladeW,bladeLen);
    ctx.fillStyle='rgba(255,255,255,0.72)';ctx.fillRect(0,Math.ceil(sc*2.2),Math.ceil(bladeW*0.38),bladeLen);
    ctx.fillStyle='rgba(0,40,100,0.38)';ctx.fillRect(Math.ceil(bladeW*0.65),Math.ceil(sc*2.2),Math.ceil(bladeW*0.35),bladeLen);
    // Tip
    ctx.fillStyle='#eef8ff';
    ctx.beginPath();ctx.moveTo(0,Math.ceil(sc*2.2)+bladeLen);ctx.lineTo(bladeW/2,Math.ceil(sc*2.2)+bladeLen+sc*1.8);ctx.lineTo(bladeW,Math.ceil(sc*2.2)+bladeLen);ctx.fill();
    // Glowing edge when glitch active
    if(isGl){ctx.strokeStyle=col;ctx.lineWidth=Math.ceil(sc*0.4);ctx.globalAlpha=0.6;ctx.beginPath();ctx.moveTo(bladeW/2,Math.ceil(sc*2.2));ctx.lineTo(bladeW/2,Math.ceil(sc*2.2)+bladeLen+sc*1.8);ctx.stroke();ctx.globalAlpha=1;}
    ctx.restore();
    // Swing arc trail
    if(p.swinging&&swingT>0.05){
      ctx.save();ctx.translate(px2,py2);
      ctx.strokeStyle=pow.weapCol;ctx.globalAlpha=0.4*(1-swingT);
      ctx.lineWidth=Math.ceil(sc*2.5);ctx.lineCap='round';
      ctx.beginPath();ctx.arc(0,0,bladeLen+Math.ceil(sc*2.2),-Math.PI*0.65,-Math.PI*0.65+swingT*Math.PI*1.15);
      ctx.stroke();ctx.globalAlpha=1;ctx.restore();
    }
    // Deflect zone — visible whenever swing is active
    if(p.swinging||p.swingFrame>0){
      const alpha=p.swinging?0.18:0.08*(1-(p.swingFrame-p.swingMax)/8);
      ctx.fillStyle=`rgba(255,255,180,${Math.max(0,alpha)})`;
      const dz=(pow.reach||44)*2.0*SX;
      ctx.fillRect(p.facing>0?pw-4*sc:-dz+4*sc,-sc*3,dz,ph+sc*6);
    }
  }

  // Head
  box3d(1,0,8,2,'#004422'); // back of helmet
  box3d(2,0,6,2,isGl?col:'#007744'); // dome
  box3d(1,1,8,4,isGl?col:'#006633',true); // helmet main
  // Face
  box3d(2,2,6,3,'#aaffdd');
  ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(2*sc,2*sc,Math.ceil(sc*0.6),3*sc);
  // Eyes with highlights
  ctx.fillStyle='#001a0d';ctx.fillRect(3*sc,3*sc,sc,sc);ctx.fillRect(6*sc,3*sc,sc,sc);
  ctx.fillStyle='rgba(255,255,255,0.75)';
  ctx.fillRect(3*sc,3*sc,Math.ceil(sc*0.4),Math.ceil(sc*0.4));
  ctx.fillRect(6*sc,3*sc,Math.ceil(sc*0.4),Math.ceil(sc*0.4));
  // Chin
  box3d(2,4,6,2,'#005528');
  // Helmet ridge highlight
  ctx.fillStyle='rgba(255,255,255,0.14)';ctx.fillRect(2*sc,sc,6*sc,Math.ceil(sc*0.5));

  // Glitch aura
  if(isGl){
    ctx.fillStyle=col;ctx.globalAlpha=0.12;
    ctx.fillRect(-sc*2,-sc*2,pw+sc*4,ph+sc*4);ctx.globalAlpha=1;
    for(let i=0;i<3;i++){
      if(Math.random()<0.4){ctx.fillStyle=col;ctx.globalAlpha=0.2;ctx.fillRect(-sc,(Math.random()*ph)|0,pw+sc*2,sc);ctx.globalAlpha=1;}
    }
  }
  ctx.restore();
}

function drawCompanion(){
  if(!companionActive)return;
  const sc=Math.max(2,Math.floor(Math.min(SX,SY)*1.8));
  const x=Math.floor((echoX-camX)*SX+shakeX);
  const y=Math.floor(GY+(echoY-camY)*SY+shakeY);
  const col=companionBetrayed?'#ff4444':'#ff44cc';
  // Glow aura
  const g=ctx.createRadialGradient(x,y,0,x,y,sc*10);
  g.addColorStop(0,companionBetrayed?'rgba(255,0,0,0.3)':'rgba(255,68,204,0.3)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,sc*10,0,Math.PI*2);ctx.fill();
  // Pixel fairy body (8x10 grid)
  ctx.save();ctx.translate(x-sc*4,y-sc*5);
  const p2=[col,col,col,col]; // dummy
  // Wings (behind)
  ctx.fillStyle='rgba(255,180,255,0.4)';
  ctx.beginPath();ctx.ellipse(-sc*3,sc*2,sc*4,sc*6,Math.PI*0.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(sc*11,sc*2,sc*4,sc*6,-Math.PI*0.2,0,Math.PI*2);ctx.fill();
  // Hair
  ctx.fillStyle='#ffaaee';
  ctx.fillRect(sc,0,6*sc,2*sc);
  ctx.fillRect(0,sc,sc,3*sc); // side hair L
  ctx.fillRect(7*sc,sc,sc,3*sc); // side hair R
  // Face
  ctx.fillStyle='#ffddee';ctx.fillRect(sc,2*sc,6*sc,4*sc);
  // Eyes — big cute
  ctx.fillStyle=companionBetrayed?'#ff0000':'#ff44cc';
  ctx.fillRect(2*sc,3*sc,2*sc,2*sc);ctx.fillRect(5*sc,3*sc,2*sc,2*sc);
  ctx.fillStyle='#fff';ctx.fillRect(2*sc,3*sc,sc,sc);ctx.fillRect(5*sc,3*sc,sc,sc);
  // Mouth — smile or worried
  if(companionBetrayed){ctx.fillStyle='#cc0000';ctx.fillRect(3*sc,5*sc,2*sc,sc);}
  else{ctx.fillStyle='#cc4466';ctx.fillRect(3*sc,5*sc,sc,sc);ctx.fillRect(4*sc,5*sc,sc,sc);}
  // Body / dress
  ctx.fillStyle=companionBetrayed?'#660000':'#cc0088';
  ctx.fillRect(2*sc,6*sc,4*sc,3*sc);
  ctx.fillStyle=companionBetrayed?'#440000':'#ff44cc';
  ctx.fillRect(sc,7*sc,6*sc,2*sc); // dress flare
  // Arms
  ctx.fillStyle='#ffddee';ctx.fillRect(0,6*sc,2*sc,2*sc);ctx.fillRect(6*sc,6*sc,2*sc,2*sc);
  // Little sparkles
  if(!companionBetrayed&&Math.random()<0.15){
    ctx.fillStyle='#ffaaff';
    const sx2=(Math.random()*12-2)|0,sy2=(Math.random()*10)|0;
    ctx.fillRect(sx2*sc,sy2*sc,sc,sc);
  }
  ctx.restore();
  // Name label
  ctx.fillStyle=col;ctx.font=`bold ${Math.max(11,Math.floor(13*Math.min(SX,SY)))}px Courier New`;
  ctx.textAlign='center';ctx.fillText('ECHO',x,y-sc*6);ctx.textAlign='left';
  // Dialogue bubble — word-wrapped, clamped to screen
  if(echoDialogueTimer>0&&echoDialogue){
    const fs=Math.max(11,Math.floor(13*Math.min(SX,1.3)));
    ctx.font=`${fs}px Courier New`;
    // Word-wrap to max 240px wide
    const maxW=Math.min(280,W*0.38);
    const words=echoDialogue.split(' ');
    const lines2=[];let cur='';
    for(const w of words){
      const test=cur?cur+' '+w:w;
      if(ctx.measureText(test).width>maxW&&cur){lines2.push(cur);cur=w;}
      else cur=test;
    }
    if(cur)lines2.push(cur);
    const lineH=fs+4;
    const boxW=Math.max(...lines2.map(l=>ctx.measureText(l).width))+20;
    const boxH=lines2.length*lineH+12;
    // Position: centered above Echo, clamped to screen
    let bx2=x-boxW/2;
    let by2=y-sc*14-boxH-8;
    bx2=Math.max(6,Math.min(W-boxW-6,bx2));
    by2=Math.max(GY+6,by2);
    ctx.fillStyle='rgba(0,0,0,0.88)';
    ctx.beginPath();ctx.roundRect(bx2,by2,boxW,boxH,8);ctx.fill();
    ctx.strokeStyle=col;ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(bx2+1,by2+1,boxW-2,boxH-2,7);ctx.stroke();
    ctx.fillStyle='#fff';
    lines2.forEach((l,i)=>ctx.fillText(l,bx2+10,by2+fs+4+i*lineH));
    // Tail pointing down to Echo
    const tailX=Math.max(bx2+10,Math.min(bx2+boxW-10,x));
    ctx.fillStyle=col;
    ctx.beginPath();ctx.moveTo(tailX-5,by2+boxH);ctx.lineTo(tailX+5,by2+boxH);ctx.lineTo(tailX,by2+boxH+10);ctx.fill();
    echoDialogueTimer--;
  }
}

// ── MAIN LOOP ────────────────────────────────────────────────────────
function update(){
  FRAME++;
  updateScale();
  // Shake decay
  if(shakeT>0){shakeT--;shakeX=(Math.random()-0.5)*5;shakeY=(Math.random()-0.5)*5;}
  else{shakeX=0;shakeY=0;}
  // Glitch lines
  const glRate=p&&p.glitchActive?0.5:0.04;
  if(Math.random()<glRate)addGLine();
  for(let i=glitchLines.length-1;i>=0;i--){glitchLines[i].life-=0.05;if(glitchLines[i].life<=0)glitchLines.splice(i,1);}
  // Particles
  for(let i=particles.length-1;i>=0;i--){const pt=particles[i];pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.12;pt.life-=0.04;if(pt.life<=0)particles.splice(i,1);}
  // Floaties
  for(let i=floaties.length-1;i>=0;i--){floaties[i].y+=floaties[i].vy;floaties[i].life-=0.025;if(floaties[i].life<=0)floaties.splice(i,1);}

  if(STATE==='title'){
    if(anyPressed()){STATE='diff';clearKp();}
    return;
  }
  if(STATE==='diff'){
    if(pressed('ArrowUp')){const d=['easy','normal','hard'];DIFF=d[Math.max(0,d.indexOf(DIFF)-1)];DM=DIFFS[DIFF];}
    if(pressed('ArrowDown')){const d=['easy','normal','hard'];DIFF=d[Math.min(2,d.indexOf(DIFF)+1)];DM=DIFFS[DIFF];}
    if(pressed('Enter')||pressed('Space')||pressed('KeyZ')){
      LEVELS=makeLevels();LVL=0;LIVES=3;SCORE=0;
      companionActive=false;companionBetrayed=false;
      storyTimer=0;initLevel(0);STATE='story';clearKp();
    }
    return;
  }
  if(STATE==='story'){
    storyTimer++;
    if(storyTimer>25&&(pressed('Enter')||pressed('Space')||pressed('KeyZ'))){
      clearKp();
      if(CL.isBoss){STATE='bossIntro';bossIntroTimer=140;}else STATE='play';
    }
    return;
  }
  if(STATE==='bossIntro'){bossIntroTimer--;if(bossIntroTimer<=0)STATE='play';return;}
  if(STATE==='dead'){
    if(pressed('Space')||pressed('Enter')||pressed('KeyZ')){
      clearKp();
      if(LIVES<=0){LEVELS=makeLevels();LVL=0;LIVES=3;SCORE=0;STATE='title';}
      else initLevel(LVL);
    }return;
  }
  if(STATE==='levelClear'){
    levelClearTimer--;
    if(levelClearTimer<=0){
      // Award item for completed level
      if(LEVEL_ITEMS[LVL])playerItems.push(LEVEL_ITEMS[LVL]);
      LVL++;
      if(LVL>=LEVELS.length){STATE='win';}
      else{
        if(LVL>=1)companionActive=true;
        if(LVL>=8)companionBetrayed=true;
        // Echo says something about the new item
        if(playerItems.length>0&&LEVEL_ITEMS[LVL-1]){
          const it=LEVEL_ITEMS[LVL-1];
          setTimeout(()=>setEchoDialogue('You got '+it.icon+' '+it.name+'!! '+it.desc,260),400);
        }
        storyTimer=0;initLevel(LVL);STATE='story';
      }
    }return;
  }
  if(STATE==='win'){if(anyPressed()){LVL=0;SCORE=0;LIVES=3;STATE='title';clearKp();}return;}

  // PLAY
  if(STATE==='play'){
    updatePlayer();
    updateEnemies();
    updateBullets();
    updateBoss();
    updateBossProj();
    updateClones();
    updateCompanionPhysics();
    updateCoins();
    checkDoor();
    updateCam();
    updateHUD();
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // Always draw HUD bg
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,GY);
  ctx.fillRect(0,H-44,W,44);

  if(STATE==='title'){drawTitle();return;}
  if(STATE==='diff'){drawDiffSelect();return;}
  if(STATE==='win'){drawWin();drawParticles();return;}

  if(CL){
    drawBg();drawPlatforms();drawClipWalls();drawBlocks();
    drawCoins();drawEnemies();drawBoss();drawBossProj();
    drawBullets();drawClones();drawDoor();
    drawPlayer();drawCompanion();
    drawParticles();drawFloaties();drawGlitchLines();
    drawHint();
  }
  if(STATE==='story'){drawStory();}
  else if(STATE==='bossIntro'){drawBossIntro();}
  else if(STATE==='dead'){drawDead();}
  else if(STATE==='levelClear'){drawLevelClear();}
}

function loop(){update();draw();clearKp();requestAnimationFrame(loop);}

// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);
    this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);
    this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();
  };
}
// Boot
LEVELS=makeLevels();
STATE='title';
for(let i=0;i<8;i++)addGLine();
requestAnimationFrame(loop);
</script>
